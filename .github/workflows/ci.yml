name: eval-once build-by-drv
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      any-jobs: ${{ steps.matrix.outputs.any-jobs }}
      manifest-version: ${{ steps.matrix.outputs.manifest-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia-beta@main
      - id: matrix
        uses: Mic92/hestia-beta/matrix@main
        with:
          nix-eval-jobs: "nix run nixpkgs#nix-eval-jobs --"

  build:
    needs: eval
    if: needs.eval.outputs.any-jobs == 'true'
    permissions:
      contents: read
    name: ${{ matrix.name }} (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.eval.outputs.matrix) }}
    steps:
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia-beta@main
        with:
          wait-manifest-version: ${{ needs.eval.outputs.manifest-version }}
      - name: Prefetch drv closure (one request)
        run: |
          set -euo pipefail
          hashes=$(for installable in ${{ matrix.installables }}; do
            basename "${installable%^*}" | cut -c1-32
          done | paste -sd,)
          curl -fsS "http://$HESTIA_LISTEN/closure/$hashes" | nix-store --import | wc -l
      - run: nix build -L ${{ matrix.installables }}
      - name: debug narinfo
        if: always()
        run: |
          drv="${{ matrix.drvPath }}"
          hash=$(basename "$drv" | cut -d- -f1)
          echo "narinfo for $drv:"
          curl -sS -w 'HTTP %{http_code}\n' "http://$HESTIA_LISTEN/$hash.narinfo" || true
          echo '--- serve.log ---'
          cat "$HESTIA_SERVE_LOG" || true
