name: eval-once build-by-drv
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      jobs: ${{ steps.eval.outputs.jobs }}
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2
      - id: eval
        run: |
          nix run nixpkgs#nix-eval-jobs -- --flake .#hydraJobs --check-cache-status > jobs.json
          jq -r '.drvPath' jobs.json | xargs "$HESTIA_BIN" hook --socket "$HESTIA_SOCKET"
          # Skip jobs whose outputs are already substitutable and collapse
          # aliased attrs that evaluate to the same derivation.
          echo "jobs=$(jq -sc 'map(select(.isCached | not)) | unique_by(.drvPath)' jobs.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: eval
    if: needs.eval.outputs.jobs != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        job: ${{ fromJSON(needs.eval.outputs.jobs) }}
    name: build ${{ matrix.job.attr }}
    steps:
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia@v2
      - run: nix build -L "${{ matrix.job.drvPath }}^*"
      - name: debug narinfo
        if: always()
        run: |
          drv="${{ matrix.job.drvPath }}"
          hash=$(basename "$drv" | cut -d- -f1)
          echo "narinfo for $drv:"
          curl -sS -w 'HTTP %{http_code}\n' "http://$HESTIA_LISTEN/$hash.narinfo" || true
          echo '--- serve.log ---'
          cat "$HESTIA_SERVE_LOG" || true
